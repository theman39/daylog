<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Day Log</title>

<!-- PWA: makes Add to Home Screen launch full-screen with no Safari chrome -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Day Log">
<meta name="theme-color" content="#E9EDE2">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%23E9EDE2'/%3E%3Cg stroke='%23C6D1B8' stroke-width='2'%3E%3Cpath d='M0 45h180M0 90h180M0 135h180M45 0v180M90 0v180M135 0v180'/%3E%3C/g%3E%3Crect x='0' y='84' width='180' height='7' fill='%23A8321B'/%3E%3Crect x='0' y='0' width='14' height='180' fill='%23D3D9C9'/%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Sans+Condensed:wght@600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --paper:#E9EDE2; --paper-deep:#DDE3D4; --grid:#C6D1B8; --rule:#A9B79A;
    --graphite:#22271F; --ink:#3C443A; --ink-soft:#6E7869; --ink-faint:#98A292;
    --red:#A8321B; --red-soft:#C9705C; --green:#46703E; --punch:#D3D9C9;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --sans:'IBM Plex Sans',system-ui,sans-serif;
    --cond:'IBM Plex Sans Condensed','IBM Plex Sans',system-ui,sans-serif;
    --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-t: env(safe-area-inset-top, 0px);
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; min-height:100%; }
  body {
    font-family:var(--sans); color:var(--ink);
    background-color:var(--paper);
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),
                     linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:22px 22px;
    -webkit-font-smoothing:antialiased;
  }

  /* ══ GATE ══ */
  #gate {
    position:fixed; inset:0; z-index:100;
    background:var(--paper-deep);
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),
                     linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:22px 22px;
    display:flex; flex-direction:column; justify-content:center;
    padding:calc(var(--safe-t) + 40px) 30px calc(var(--safe-b) + 40px) 44px;
    cursor:pointer;
  }
  #gate.gone { display:none; }
  #gate::before {
    content:''; position:absolute; top:0; bottom:0; left:0; width:26px;
    background:var(--punch); border-right:1.5px solid var(--red-soft);
  }
  .g-date {
    font-family:var(--mono); font-size:10px; letter-spacing:.16em;
    text-transform:uppercase; color:var(--ink-soft); margin-bottom:26px;
  }
  .g-msg {
    font-family:var(--cond); font-weight:700;
    font-size:clamp(30px,8.5vw,54px); line-height:.98;
    letter-spacing:.01em; text-transform:uppercase; color:var(--graphite);
    max-width:12ch;
  }
  .g-msg .hl { color:var(--red); }
  .g-rule { height:2px; background:var(--graphite); margin:28px 0 22px; max-width:220px; }
  .g-facts { display:flex; flex-direction:column; gap:11px; }
  .g-fact {
    font-family:var(--mono); font-size:11.5px; color:var(--ink-soft);
    display:flex; gap:9px; align-items:baseline;
  }
  .g-fact b { font-size:16px; font-weight:700; color:var(--graphite); }
  .g-fact b.warn { color:var(--red); }
  .g-go {
    margin-top:34px; font-family:var(--mono); font-weight:600;
    font-size:11px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--red);
  }
  .g-go::after { content:' →'; }

  /* ══ SHELL ══ */
  #shell { display:none; padding-bottom:calc(var(--safe-b) + 74px); }
  #shell.on { display:block; }
  #rail { position:fixed; top:0; bottom:0; left:0; width:26px; background:var(--punch);
          border-right:1.5px solid var(--red-soft); z-index:1; }
  #sheet { padding:calc(var(--safe-t) + 18px) 16px 0 42px; max-width:1180px; margin:0 auto; position:relative; z-index:2; }

  header { display:flex; align-items:flex-end; justify-content:space-between; gap:14px;
           flex-wrap:wrap; border-bottom:2px solid var(--graphite); padding-bottom:9px; }
  h1 { font-family:var(--cond); font-weight:700; font-size:24px; letter-spacing:.13em;
       text-transform:uppercase; color:var(--graphite); margin:0; line-height:1; }
  .subhead { font-family:var(--mono); font-size:9.5px; letter-spacing:.1em;
             text-transform:uppercase; color:var(--ink-soft); margin-top:6px; }
  .stamps { display:flex; gap:8px; flex-wrap:wrap; }
  .stamp { border:1.5px solid var(--red); color:var(--red); font-family:var(--mono);
           font-weight:600; font-size:8.5px; letter-spacing:.09em; text-transform:uppercase;
           padding:4px 7px; transform:rotate(-1.1deg); line-height:1.3; text-align:center; opacity:.88; }
  .stamp b { display:block; font-size:15px; letter-spacing:.02em; }

  .eyebrow { font-family:var(--mono); font-weight:600; font-size:9.5px; letter-spacing:.17em;
             text-transform:uppercase; color:var(--ink-soft); border-bottom:1px solid var(--rule);
             padding-bottom:5px; margin:0 0 11px; display:flex; justify-content:space-between; align-items:baseline; }
  .eyebrow span { color:var(--ink-faint); letter-spacing:.05em; }

  /* ══ NOW ══ */
  #now { border:2px solid var(--graphite); background:var(--paper-deep); padding:14px 15px; margin:18px 0 24px; }
  #now-label { font-family:var(--mono); font-size:9px; letter-spacing:.18em; text-transform:uppercase;
               color:var(--ink-soft); margin-bottom:4px; }
  #now-name { font-family:var(--cond); font-weight:700; font-size:clamp(24px,6.5vw,31px);
              text-transform:uppercase; letter-spacing:.04em; color:var(--graphite); line-height:1.05; }
  #now-meta { font-family:var(--mono); font-size:10.5px; color:var(--ink-soft); margin-top:8px;
              display:flex; gap:14px; flex-wrap:wrap; }
  #now-meta b { color:var(--red); font-weight:600; }
  #now-bar { height:5px; background:var(--punch); margin-top:10px; border:1px solid var(--rule); }
  #now-fill { height:100%; background:var(--red); width:0%; transition:width .6s linear; }

  /* ══ SPINE ══ */
  #spine { position:relative; border-left:2px solid var(--graphite); height:560px; }
  .blk { position:absolute; left:0; right:0; padding-left:12px; display:flex; gap:8px;
         align-items:flex-start; border-top:1px solid var(--rule); }
  .blk .t { font-family:var(--mono); font-size:9.5px; font-weight:500; color:var(--ink-faint);
            padding-top:2px; flex-shrink:0; width:32px; }
  .blk .n { font-family:var(--cond); font-weight:600; font-size:13px; text-transform:uppercase;
            letter-spacing:.05em; color:var(--ink); line-height:1.25; padding-top:1px; }
  .blk.past .n,.blk.past .t { color:var(--ink-faint); }
  .blk.past .n { text-decoration:line-through; text-decoration-color:var(--red-soft); text-decoration-thickness:1.5px; }
  .blk.live { background:rgba(168,50,27,.09); }
  .blk.live .n,.blk.live .t { color:var(--red); }
  .blk.live .n { font-weight:700; }
  .blk.anchor .n::after { content:'◆'; font-size:6.5px; margin-left:5px; vertical-align:2px; color:var(--green); }
  #nowline { position:absolute; left:-6px; right:-4px; height:0; border-top:2px solid var(--red);
             z-index:4; display:flex; align-items:center; pointer-events:none; }
  #nowline::before { content:''; width:0; height:0; margin-left:-1px; border:5px solid transparent; border-left-color:var(--red); }
  #nowclock { font-family:var(--mono); font-weight:700; font-size:9px; background:var(--red);
              color:var(--paper); padding:1.5px 5px; margin-left:auto; }

  /* ══ LISTS ══ */
  .list { list-style:none; margin:0; padding:0; }
  .list li { border-bottom:1px dotted var(--rule); }
  .chk { display:flex; align-items:center; gap:11px; cursor:pointer; padding:11px 2px;
         font-size:14px; line-height:1.35; user-select:none; }
  .chk input { position:absolute; opacity:0; width:0; height:0; }
  .box { width:17px; height:17px; flex-shrink:0; border:1.5px solid var(--ink-soft);
         background:var(--paper); display:flex; align-items:center; justify-content:center; }
  .box::after { content:'✓'; font-size:14px; font-weight:700; color:var(--green); opacity:0;
                transform:scale(.5) rotate(-12deg); transition:all .13s ease-out; }
  .chk input:checked + .box::after { opacity:1; transform:scale(1) rotate(-8deg); }
  .chk input:checked ~ .txt { color:var(--ink-faint); text-decoration:line-through; text-decoration-color:var(--ink-faint); }
  .chk input:focus-visible + .box { outline:2px solid var(--red); outline-offset:2px; }
  .txt em { font-style:normal; font-family:var(--mono); font-size:10px; color:var(--ink-faint); }
  .stack-note { font-family:var(--mono); font-size:9.5px; color:var(--ink-faint); margin:9px 0 0; line-height:1.5; }

  /* ══ METRICS ══ */
  .m { display:grid; grid-template-columns:74px 56px 1fr 76px; align-items:center; gap:9px;
       padding:9px 0; border-bottom:1px dotted var(--rule); }
  .m-name { font-family:var(--cond); font-weight:600; font-size:12.5px; text-transform:uppercase;
            letter-spacing:.06em; color:var(--ink); }
  .m input { font-family:var(--mono); font-weight:700; font-size:15px; width:100%; padding:5px 4px;
             text-align:right; border:none; border-bottom:1.5px solid var(--rule);
             background:transparent; color:var(--graphite); border-radius:0; -webkit-appearance:none; }
  .m input:focus { outline:none; border-bottom-color:var(--red); background:rgba(168,50,27,.05); }
  .m input::placeholder { color:var(--ink-faint); font-weight:400; }
  .spark { height:26px; display:block; }
  .m-avg { font-family:var(--mono); font-size:9.5px; text-align:right; color:var(--ink-soft); line-height:1.4; }
  .m-avg b { display:block; font-size:15px; font-weight:700; color:var(--graphite); }
  .m-avg.hit b { color:var(--green); }
  .m-avg.miss b { color:var(--red); }

  /* ══ TODO ══ */
  #todo-add { display:flex; gap:7px; margin-bottom:9px; }
  #todo-in { flex:1; font-family:var(--sans); font-size:16px; padding:8px 9px; background:var(--paper);
             border:1.5px solid var(--rule); color:var(--graphite); border-radius:0; -webkit-appearance:none; }
  #todo-in:focus { outline:none; border-color:var(--red); }
  #todo-btn { font-family:var(--mono); font-weight:600; font-size:11px; letter-spacing:.1em;
              text-transform:uppercase; cursor:pointer; padding:0 14px; background:var(--graphite);
              color:var(--paper); border:none; }
  .del { margin-left:auto; cursor:pointer; border:none; background:none; color:var(--ink-faint);
         font-family:var(--mono); font-size:17px; padding:0 6px; line-height:1; }
  .empty { font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); padding:10px 0; line-height:1.65; }

  /* ══ TABS (mobile) ══ */
  #nav { position:fixed; left:0; right:0; bottom:0; z-index:30;
         background:var(--paper-deep); border-top:2px solid var(--graphite);
         display:flex; padding-bottom:var(--safe-b); }
  #nav button {
    flex:1; border:none; background:none; cursor:pointer; padding:12px 4px 11px;
    font-family:var(--mono); font-weight:600; font-size:9.5px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--ink-faint); border-top:3px solid transparent; margin-top:-2px;
  }
  #nav button.on { color:var(--red); border-top-color:var(--red); }
  .pane { display:none; }
  .pane.on { display:block; }
  section + section { margin-top:26px; }

  #save { position:fixed; bottom:calc(var(--safe-b) + 78px); right:12px; z-index:40;
          font-family:var(--mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase;
          padding:5px 10px; background:var(--graphite); color:var(--paper); opacity:0;
          transition:opacity .3s; pointer-events:none; }
  #save.on { opacity:.92; }
  #save.err { background:var(--red); }

  /* ══ DESKTOP ══ */
  @media (min-width:900px) {
    #nav { display:none; }
    #shell { padding-bottom:50px; }
    #rail { width:34px; }
    #sheet { padding:24px 26px 0 58px; }
    h1 { font-size:30px; }
    .pane { display:block !important; }
    #panes { display:grid; grid-template-columns:300px 1fr; gap:34px; align-items:start; margin-top:22px; }
    #pane-day { position:sticky; top:16px; }
    #now { margin-top:0; }
    #cols { display:grid; grid-template-columns:1fr 1fr; gap:30px; }
    #save { bottom:14px; }
    .m { grid-template-columns:92px 62px 1fr 84px; gap:12px; }
  }
  @media (prefers-reduced-motion:reduce) { * { transition:none !important; } }
</style>
</head>
<body>

<!-- ══ GATE ══ -->
<div id="gate" role="button" tabindex="0" aria-label="Start the day">
  <div class="g-date" id="g-date"></div>
  <div class="g-msg">Another day.<br>Another chance to be the <span class="hl">man you want to be.</span></div>
  <div class="g-rule"></div>
  <div class="g-facts" id="g-facts"></div>
  <div class="g-go">Begin</div>
</div>

<!-- ══ APP ══ -->
<div id="shell">
  <div id="rail"></div>
  <div id="sheet">

    <header>
      <div>
        <h1>Day Log</h1>
        <div class="subhead" id="datestamp"></div>
      </div>
      <div class="stamps">
        <div class="stamp">Berkeley<b id="cd-cal">—</b>days</div>
        <div class="stamp">Stanford<b id="cd-stan">—</b>days</div>
      </div>
    </header>

    <div id="panes">

      <div class="pane on" id="pane-day">
        <div id="now">
          <div id="now-label">Right now</div>
          <div id="now-name">—</div>
          <div id="now-meta"></div>
          <div id="now-bar"><div id="now-fill"></div></div>
        </div>
        <div class="eyebrow">The day <span id="spine-pct"></span></div>
        <div id="spine"><div id="nowline"><div id="nowclock">--:--</div></div></div>
      </div>

      <div>
        <div class="pane" id="pane-log">
          <div id="cols">
            <section>
              <div class="eyebrow">Non-negotiables <span id="hab-count"></span></div>
              <ul class="list" id="habits"></ul>
            </section>
            <section>
              <div class="eyebrow">Morning</div>
              <ul class="list" id="am"></ul>
              <div class="eyebrow" style="margin-top:22px">Wind-down</div>
              <ul class="list" id="pm"></ul>
              <p class="stack-note">Caffeine half-life is 5–6 hours. Nothing after 14:00.</p>
            </section>
          </div>
        </div>

        <div class="pane" id="pane-num">
          <section>
            <div class="eyebrow">Numbers <span>today · 7-day avg</span></div>
            <div id="mlist"></div>
          </section>
        </div>

        <div class="pane" id="pane-todo">
          <section>
            <div class="eyebrow">Todo <span id="todo-count"></span></div>
            <div id="todo-add">
              <input id="todo-in" placeholder="Add one thing…" maxlength="120">
              <button id="todo-btn">Add</button>
            </div>
            <ul class="list" id="todos"></ul>
          </section>
        </div>
      </div>

    </div>
  </div>
</div>

<nav id="nav">
  <button data-p="day"  class="on">Day</button>
  <button data-p="log">Log</button>
  <button data-p="num">Numbers</button>
  <button data-p="todo">Todo</button>
</nav>

<div id="save">Saved</div>

<script>
(function () {
  'use strict';
  var KEY = 'logbook:v1';
  var state = { days:{}, todos:[] };

  /* ── storage cascade ──
     window.storage → works inside the Claude artifact preview
     localStorage   → works when self-hosted on GitHub Pages / added to Home Screen
     memory         → last resort so the app never hard-fails                */
  var mem = {};
  var MODE = (function () {
    if (typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function') return 'store';
    try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); return 'local'; }
    catch (e) { return 'mem'; }
  })();

  function load() {
    if (MODE === 'store') return window.storage.get(KEY).then(function(r){return r?r.value:null;}).catch(function(){return null;});
    if (MODE === 'local') { try { return Promise.resolve(localStorage.getItem(KEY)); } catch(e){ return Promise.resolve(null); } }
    return Promise.resolve(mem[KEY] || null);
  }
  function persist() {
    var v = JSON.stringify(state);
    if (MODE === 'store') {
      window.storage.set(KEY, v).then(function(r){ flash(r?'Saved':'Not saved — retry', !r); })
        .catch(function(){ flash('Not saved — retry', true); });
    } else if (MODE === 'local') {
      try { localStorage.setItem(KEY, v); flash('Saved'); }
      catch (e) { flash('Storage full — retry', true); }
    } else {
      mem[KEY] = v; flash('Saved (session only)');
    }
  }
  var saveEl = document.getElementById('save'), fT;
  function flash(m, err) {
    saveEl.textContent = m; saveEl.className = 'on' + (err ? ' err' : '');
    clearTimeout(fT); fT = setTimeout(function(){ saveEl.className=''; }, err?4000:1200);
  }

  /* ── day record ── */
  function key(d){ d=d||new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function today(){ var k=key();
    if(!state.days[k]) state.days[k]={habits:{},am:{},pm:{},metrics:{}};
    return state.days[k]; }

  /* ── schedule (edit these two arrays to match your real day) ── */
  var WEEKDAY = [
    {t:420, e:465, n:'Wake · weigh · light', a:1},
    {t:465, e:480, n:'Out the door'},
    {t:480, e:660, n:'Class / lab'},
    {t:690, e:780, n:'Deep work #1', a:1},
    {t:780, e:825, n:'Prefuel'},
    {t:825, e:930, n:'Gym · 90 min cap', a:1},
    {t:930, e:1050,n:'Build block', a:1},
    {t:1050,e:1140,n:'Dinner · free'},
    {t:1140,e:1260,n:'Deep work #2', a:1},
    {t:1260,e:1380,n:'Off duty · no guilt'},
    {t:1380,e:1410,n:'Wind-down', a:1},
    {t:1410,e:1410,n:'Lights out', a:1}
  ];
  var WEEKEND = [
    {t:420, e:465, n:'Wake · weigh · light', a:1},
    {t:465, e:690, n:'Open'},
    {t:690, e:780, n:'Deep work #1', a:1},
    {t:780, e:825, n:'Prefuel'},
    {t:825, e:930, n:'Gym · 90 min cap', a:1},
    {t:930, e:1080,n:'Build block', a:1},
    {t:1080,e:1380,n:'Friends · off duty'},
    {t:1380,e:1410,n:'Wind-down', a:1},
    {t:1410,e:1410,n:'Lights out', a:1}
  ];
  var DAY_START=420, DAY_END=1410;
  function sched(){ var d=new Date().getDay(); return (d===0||d===6)?WEEKEND:WEEKDAY; }
  function hhmm(m){ return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
  function mins(){ var n=new Date(); return n.getHours()*60+n.getMinutes(); }

  /* ── checklists ── */
  var HABITS=[['up','Up at 07:00'],['dw1','Deep work #1 done'],['bag','Phone in the bag at the gym'],
              ['cap','Gym under 90 minutes'],['build','Build block done'],['dw2','Deep work #2 done'],
              ['out','Lights out by 23:30']];
  var AM=[['weigh','Weigh in <em>post-bathroom</em>'],['light','Daylight <em>within 30 min of waking</em>'],
          ['clean','Cleanser'],['spf','Moisturizer + SPF']];
  var PM=[['caff','Last caffeine was before 14:00'],['yog','Yogurt + protein <em>by 21:30</em>'],
          ['crea','Creatine <em>5g</em>'],['d3','Vitamin D3'],['mag','Magnesium glycinate'],
          ['clean2','Cleanser'],['ret','Retinoid <em>2×/week to start</em>'],['moist','Moisturizer'],
          ['dim','Screens down, lights dim <em>23:00</em>'],['charge','Phone charging outside the bedroom']];
  var METRICS=[
    {k:'sleep', n:'Sleep', ph:'hrs', tgt:7.5, dir:'up',   unit:'h',  dec:1},
    {k:'screen',n:'Screen',ph:'hrs', tgt:3,   dir:'down', unit:'h',  dec:1},
    {k:'gym',   n:'Gym',   ph:'min', tgt:95,  dir:'down', unit:'m',  dec:0},
    {k:'build', n:'Build', ph:'hrs', tgt:2,   dir:'up',   unit:'h',  dec:1},
    {k:'weight',n:'Weight',ph:'lbs', tgt:null,dir:null,   unit:'lb', dec:1}
  ];

  function checklist(id, defs, bucket) {
    var el=document.getElementById(id); el.innerHTML='';
    var day=today();
    defs.forEach(function(d){
      var li=document.createElement('li'), lab=document.createElement('label');
      lab.className='chk';
      var i=document.createElement('input'); i.type='checkbox'; i.checked=!!day[bucket][d[0]];
      i.addEventListener('change',function(){ today()[bucket][d[0]]=i.checked; persist(); counts(); });
      var b=document.createElement('span'); b.className='box';
      var t=document.createElement('span'); t.className='txt'; t.innerHTML=d[1];
      lab.appendChild(i); lab.appendChild(b); lab.appendChild(t); li.appendChild(lab); el.appendChild(li);
    });
  }
  function counts(){
    var day=today(), n=HABITS.filter(function(h){return day.habits[h[0]];}).length;
    document.getElementById('hab-count').textContent=n+'/'+HABITS.length;
  }

  /* ── metrics ── */
  function lastN(k,n){ var out=[],d=new Date();
    for(var i=0;i<n;i++){ var r=state.days[key(d)], v=r&&r.metrics?r.metrics[k]:undefined;
      out.unshift(typeof v==='number'?v:null); d.setDate(d.getDate()-1); }
    return out; }
  function spark(vals){
    var nums=vals.filter(function(v){return v!==null;});
    if(!nums.length) return '<svg class="spark" width="100%" height="26"></svg>';
    var mx=Math.max.apply(null,nums), mn=Math.min.apply(null,nums), rg=(mx-mn)||1, w=100/vals.length;
    return '<svg class="spark" width="100%" height="26" preserveAspectRatio="none">'+vals.map(function(v,i){
      if(v===null) return '<rect x="'+(i*w+w*.2)+'%" y="24" width="'+(w*.6)+'%" height="2" fill="var(--ink-faint)" opacity=".4"/>';
      var h=5+((v-mn)/rg)*19;
      return '<rect x="'+(i*w+w*.2)+'%" y="'+(26-h)+'" width="'+(w*.6)+'%" height="'+h+'" fill="'+(i===vals.length-1?'var(--red)':'var(--rule)')+'"/>';
    }).join('')+'</svg>';
  }
  function metrics(){
    var wrap=document.getElementById('mlist'); wrap.innerHTML=''; var day=today();
    METRICS.forEach(function(m){
      var row=document.createElement('div'); row.className='m';
      var nm=document.createElement('div'); nm.className='m-name'; nm.textContent=m.n;
      var i=document.createElement('input');
      i.type='number'; i.step='any'; i.inputMode='decimal'; i.placeholder=m.ph;
      i.setAttribute('aria-label', m.n+' today');
      if(typeof day.metrics[m.k]==='number') i.value=day.metrics[m.k];
      i.addEventListener('change',function(){
        var v=parseFloat(i.value);
        if(isNaN(v)) delete today().metrics[m.k]; else today().metrics[m.k]=v;
        persist(); metrics();
      });
      var sp=document.createElement('div'); var vals=lastN(m.k,7); sp.innerHTML=spark(vals);
      var nums=vals.filter(function(v){return v!==null;});
      var avg=nums.length?nums.reduce(function(a,b){return a+b;},0)/nums.length:null;
      var ag=document.createElement('div'); ag.className='m-avg';
      if(avg===null){ ag.innerHTML='<b>—</b>no data'; }
      else {
        var hit = m.dir==='up'?avg>=m.tgt : m.dir==='down'?avg<=m.tgt : null;
        if(hit===true) ag.className+=' hit'; if(hit===false) ag.className+=' miss';
        ag.innerHTML='<b>'+avg.toFixed(m.dec)+m.unit+'</b>'+(m.tgt!==null?(m.dir==='up'?'≥ ':'≤ ')+m.tgt+m.unit:'avg');
      }
      row.appendChild(nm); row.appendChild(i); row.appendChild(sp); row.appendChild(ag);
      wrap.appendChild(row);
    });
  }

  /* ── todos ── */
  function todos(){
    var el=document.getElementById('todos'); el.innerHTML='';
    if(!state.todos.length)
      el.innerHTML='<li class="empty">Nothing here. First two: turn on Screen Time, and pull your degree audit and count your transferable units.</li>';
    state.todos.forEach(function(t,i){
      var li=document.createElement('li'), lab=document.createElement('label'); lab.className='chk';
      var c=document.createElement('input'); c.type='checkbox'; c.checked=!!t.done;
      c.addEventListener('change',function(){ state.todos[i].done=c.checked; persist(); todos(); });
      var b=document.createElement('span'); b.className='box';
      var x=document.createElement('span'); x.className='txt'; x.textContent=t.text;
      var d=document.createElement('button'); d.className='del'; d.textContent='×';
      d.setAttribute('aria-label','Delete: '+t.text);
      d.addEventListener('click',function(e){ e.preventDefault(); state.todos.splice(i,1); persist(); todos(); });
      lab.appendChild(c); lab.appendChild(b); lab.appendChild(x); lab.appendChild(d);
      li.appendChild(lab); el.appendChild(li);
    });
    var open=state.todos.filter(function(t){return !t.done;}).length;
    document.getElementById('todo-count').textContent=open?open+' open':'';
  }
  function addTodo(){
    var i=document.getElementById('todo-in'), v=i.value.trim();
    if(!v) return;
    state.todos.push({text:v,done:false}); i.value=''; persist(); todos();
  }
  document.getElementById('todo-btn').addEventListener('click',addTodo);
  document.getElementById('todo-in').addEventListener('keydown',function(e){ if(e.key==='Enter') addTodo(); });

  /* ── spine ── */
  function spine(){
    var el=document.getElementById('spine');
    el.querySelectorAll('.blk').forEach(function(n){ n.remove(); });
    var S=sched(), span=DAY_END-DAY_START, H=el.clientHeight||560, m=mins();
    S.forEach(function(b){
      var d=document.createElement('div'); d.className='blk'+(b.a?' anchor':'');
      d.style.top=(((b.t-DAY_START)/span)*H)+'px';
      d.style.minHeight=Math.max(((b.e-b.t)/span)*H,20)+'px';
      if(m>=b.e && b.e>b.t) d.className+=' past';
      if(m>=b.t && m<b.e)   d.className+=' live';
      d.innerHTML='<div class="t">'+hhmm(b.t)+'</div><div class="n">'+b.n+'</div>';
      el.appendChild(d);
    });
    var nl=document.getElementById('nowline');
    if(m<DAY_START||m>DAY_END){ nl.style.display='none'; }
    else {
      nl.style.display='flex';
      nl.style.top=(((m-DAY_START)/span)*H)+'px';
      var n=new Date();
      document.getElementById('nowclock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
    }
    document.getElementById('spine-pct').textContent=Math.round(Math.min(Math.max((m-DAY_START)/span,0),1)*100)+'% elapsed';
  }

  function current(){
    var S=sched(), m=mins(), cur=null, nxt=null;
    for(var i=0;i<S.length;i++){
      if(m>=S[i].t && m<S[i].e){ cur=S[i]; nxt=S[i+1]||null; break; }
      if(m<S[i].t){ nxt=S[i]; break; }
    }
    return {cur:cur, nxt:nxt, m:m};
  }
  function nowCard(){
    var c=current(), nm=document.getElementById('now-name'), mt=document.getElementById('now-meta');
    if(c.cur){
      nm.textContent=c.cur.n;
      document.getElementById('now-fill').style.width=Math.min(((c.m-c.cur.t)/(c.cur.e-c.cur.t))*100,100)+'%';
      mt.innerHTML='<span><b>'+(c.cur.e-c.m)+' min</b> left</span>'+(c.nxt?'<span>Next · '+c.nxt.n+' at '+hhmm(c.nxt.t)+'</span>':'');
    } else if(c.m<DAY_START){
      nm.textContent='Asleep'; document.getElementById('now-fill').style.width='0%';
      mt.innerHTML='<span>Up at <b>07:00</b></span>';
    } else if(c.m>=DAY_END){
      nm.textContent='Lights out'; document.getElementById('now-fill').style.width='100%';
      mt.innerHTML='<span><b>Put it down.</b> The day is logged.</span>';
    } else {
      nm.textContent=c.nxt?'Gap':'Open'; document.getElementById('now-fill').style.width='0%';
      mt.innerHTML=c.nxt?'<span>Next · '+c.nxt.n+' at <b>'+hhmm(c.nxt.t)+'</b></span>':'';
    }
  }

  function daysTo(iso){ return Math.max(Math.ceil((new Date(iso+'T23:59:59')-new Date())/86400000),0); }
  function header(){
    document.getElementById('datestamp').textContent =
      new Date().toLocaleDateString(undefined,{weekday:'long',day:'2-digit',month:'short',year:'numeric'});
    document.getElementById('cd-cal').textContent=daysTo('2026-11-30');
    document.getElementById('cd-stan').textContent=daysTo('2027-03-15');
  }

  /* ── gate ── */
  function gate(){
    document.getElementById('g-date').textContent =
      new Date().toLocaleDateString(undefined,{weekday:'long',day:'2-digit',month:'long'});
    var c=current();
    var sl=lastN('sleep',7).filter(function(v){return v!==null;});
    var slAvg=sl.length?(sl.reduce(function(a,b){return a+b;},0)/sl.length):null;
    var f=[];
    f.push('<div class="g-fact"><b>'+(c.cur?c.cur.n:(c.nxt?c.nxt.n+' at '+hhmm(c.nxt.t):'Open'))+'</b> '+(c.cur?'right now':'up next')+'</div>');
    f.push('<div class="g-fact"><b class="warn">'+daysTo('2026-11-30')+'</b> days until the Berkeley application closes</div>');
    if(slAvg!==null)
      f.push('<div class="g-fact"><b'+(slAvg<7?' class="warn"':'')+'>'+slAvg.toFixed(1)+'h</b> sleep, 7-day average</div>');
    document.getElementById('g-facts').innerHTML=f.join('');
  }
  function enter(){
    document.getElementById('gate').classList.add('gone');
    document.getElementById('shell').classList.add('on');
    tick();
  }
  var g=document.getElementById('gate');
  g.addEventListener('click',enter);
  g.addEventListener('keydown',function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); enter(); } });

  /* ── tabs ── */
  document.querySelectorAll('#nav button').forEach(function(b){
    b.addEventListener('click',function(){
      document.querySelectorAll('#nav button').forEach(function(x){ x.classList.remove('on'); });
      b.classList.add('on');
      document.querySelectorAll('.pane').forEach(function(p){ p.classList.remove('on'); });
      document.getElementById('pane-'+b.dataset.p).classList.add('on');
      if(b.dataset.p==='day') spine();
      window.scrollTo(0,0);
    });
  });

  function tick(){ spine(); nowCard(); header(); }

  /* ── boot ── */
  load().then(function(raw){
    if(raw){
      try {
        var p=JSON.parse(raw);
        if(p && typeof p==='object'){ state.days=p.days||{}; state.todos=Array.isArray(p.todos)?p.todos:[]; }
      } catch(e){ /* unreadable record — start clean rather than block the day */ }
    }
    checklist('habits',HABITS,'habits');
    checklist('am',AM,'am');
    checklist('pm',PM,'pm');
    counts(); metrics(); todos(); header(); gate();
    setInterval(function(){ if(document.getElementById('shell').classList.contains('on')) tick(); },30000);
    window.addEventListener('resize',spine);
    document.addEventListener('visibilitychange',function(){
      if(!document.hidden && document.getElementById('shell').classList.contains('on')) tick();
    });
  });
})();
</script>
</body>
